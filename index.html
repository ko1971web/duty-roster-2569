<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตารางเวร 2569</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; padding: 20px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h2>ระบบตารางเวร 2569</h2>

    <div id="loginSection">
        <p>กรุณาเข้าสู่ระบบเพื่อดูและจัดการตารางเวร</p>
        <button id="loginBtn">ล็อกอินด้วย Google</button>
    </div>

    <div id="appSection" class="hidden">
        <p>ยินดีต้อนรับ, <span id="userName"></span>! <button id="logoutBtn">ออกจากระบบ</button></p>
        
        <hr>
        
        <h3>เพิ่มข้อมูลเวร</h3>
        <input type="date" id="dateInput" required>
        <input type="text" id="nameInput" placeholder="ชื่อผู้เข้าเวร" required>
        <button id="addBtn">บันทึกเวร</button>

        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>ชื่อผู้เข้าเวร</th>
                </tr>
            </thead>
            <tbody id="rosterTableBody">
                </tbody>
        </table>
    </div>

    <script type="module">
        // 1. นำเข้าคำสั่งของ Firebase จากอินเทอร์เน็ต
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. 👇 นำ firebaseConfig ของคุณมาวางแทนที่ตรงนี้ 👇
const firebaseConfig = {
  apiKey: "AIzaSyDtUJ-yR7MdMsqC99I25tIeKdRauYvTGIk",
  authDomain: "duty-roster-2569.firebaseapp.com",
  projectId: "duty-roster-2569",
  storageBucket: "duty-roster-2569.firebasestorage.app",
  messagingSenderId: "378205892214",
  appId: "1:378205892214:web:d73d85a7fefc7dd5747957",
  measurementId: "G-8ZT33Y5YW4"
};

        // 3. เปิดใช้งาน Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 4. จัดการ UI (หา Elements ต่างๆ ในหน้าเว็บ)
        const loginSection = document.getElementById('loginSection');
        const appSection = document.getElementById('appSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userNameSpan = document.getElementById('userName');
        const addBtn = document.getElementById('addBtn');
        const rosterTableBody = document.getElementById('rosterTableBody');

        // 5. โค้ดสำหรับ Login / Logout
        loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));
        logoutBtn.addEventListener('click', () => signOut(auth));

        // ตรวจสอบสถานะว่า Login อยู่หรือไม่
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ถ้า Login แล้ว ให้ซ่อนปุ่ม Login และแสดงระบบตาราง
                loginSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                userNameSpan.textContent = user.displayName;
                
                // ดึงข้อมูลตารางเวรมาแสดง
                loadRoster();
            } else {
                // ถ้ายังไม่ Login
                loginSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // 6. โค้ดสำหรับดึงข้อมูลตารางเวรแบบ Real-time (อ่านข้อมูล)
        function loadRoster() {
            const q = query(collection(db, "rosterData"), orderBy("date", "asc"));
            
            // onSnapshot คือการเฝ้าดูข้อมูล ถ้ามีใครเพิ่ม/แก้ ข้อมูลในตารางจะอัปเดตเองทันที
            onSnapshot(q, (querySnapshot) => {
                rosterTableBody.innerHTML = ''; // ล้างตารางเก่าก่อน
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = `<tr>
                                    <td>${data.date}</td>
                                    <td>${data.name}</td>
                                 </tr>`;
                    rosterTableBody.innerHTML += row;
                });
            });
        }

        // 7. โค้ดสำหรับเพิ่มข้อมูลเวรลงฐานข้อมูล (เขียนข้อมูล)
        addBtn.addEventListener('click', async () => {
            const dateVal = document.getElementById('dateInput').value;
            const nameVal = document.getElementById('nameInput').value;

            if (dateVal && nameVal) {
                try {
                    // บันทึกข้อมูลลง Collection ที่ชื่อว่า "rosterData"
                    await addDoc(collection(db, "rosterData"), {
                        date: dateVal,
                        name: nameVal,
                        addedBy: auth.currentUser.email // บันทึกด้วยว่าใครเป็นคนแอด
                    });
                    
                    // เคลียร์ช่องกรอกข้อมูล
                    document.getElementById('dateInput').value = '';
                    document.getElementById('nameInput').value = '';
                    alert("บันทึกข้อมูลสำเร็จ!");
                } catch (e) {
                    console.error("Error adding document: ", e);
                    alert("เกิดข้อผิดพลาดในการบันทึก");
                }
            } else {
                alert("กรุณากรอกวันที่และชื่อให้ครบ");
            }
        });
    </script>
</body>
</html>
